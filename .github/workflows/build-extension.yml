name: Build & Package Extension

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build & package
        run: npm run pack

      - name: Upload extension zip
        uses: actions/upload-artifact@v4
        with:
          name: palsplan-web-protector
          path: palsplan-web-protector.zip

      - name: Publish extension to GitHub Releases
        run: |
          gh release delete latest --yes --cleanup-tag 2>/dev/null || true
          gh release create latest palsplan-web-protector.zip \
            --title "Latest Build" \
            --notes "Pre-built extension ZIP. Download \`palsplan-web-protector.zip\`, then load it as an unpacked extension in Chrome (\`chrome://extensions\` → Enable Developer mode → Load unpacked → select the unzipped folder)." \
            --latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
