name: Build & Package Extension

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build & package
        run: npm run pack

      - name: Upload extension zip
        uses: actions/upload-artifact@v4
        with:
          name: palsplan-web-protector
          path: palsplan-web-protector.zip
