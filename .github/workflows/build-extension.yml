name: Build & Package Extension

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build extension & package
        run: npm run pack
        env:
          BUILD_NUMBER: ${{ github.run_number }}

      - name: Build CRX
        run: node scripts/pack-crx.js
        env:
          BUILD_NUMBER: ${{ github.run_number }}

      - name: Verify CRX was created
        run: |
          if [ ! -s backend/public/extension.crx ]; then
            echo "ERROR: backend/public/extension.crx is missing or empty"
            exit 1
          fi
          echo "extension.crx OK ($(wc -c < backend/public/extension.crx) bytes)"

      - name: Commit extension.crx to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backend/public/extension.crx
          if git diff --cached --quiet; then
            echo "extension.crx unchanged — nothing to commit"
          else
            git commit -m "chore: update extension.crx [skip ci]"
            git push
          fi

      - name: Upload extension zip
        uses: actions/upload-artifact@v4
        with:
          name: watson-control-tower
          path: watson-control-tower.zip

      - name: Publish extension to GitHub Releases
        run: |
          gh release create "build-${{ github.run_number }}" watson-control-tower.zip \
            --title "Latest Build" \
            --notes "Pre-built extension ZIP. Download \`watson-control-tower.zip\`, then load it as an unpacked extension in Chrome (\`chrome://extensions\` → Enable Developer mode → Load unpacked → select the unzipped folder)." \
            --latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
