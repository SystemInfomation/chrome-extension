services:
  - type: web
    name: watson-control-tower-monitor
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: PORT
        value: 10000
      - key: BACKEND_URL
        value: https://backend.watsons.app
      - key: DATABASE_URL
        sync: false
    autoDeploy: true
