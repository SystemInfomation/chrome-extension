<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Activity Reports — InternetWize</title>
  <link rel="stylesheet" href="shared.css">
</head>
<body>
  <div class="container">
    <h1>📊 Activity Reports</h1>
    <nav class="nav-tabs">
      <a href="reports.html" class="active">Reports</a>
      <a href="timeline.html">Incident Timeline</a>
      <a href="live-view.html">Live View</a>
    </nav>

    <!-- Summary stats -->
    <div class="stats-row" id="statsRow">
      <div class="stat-card">
        <div class="stat-value" id="statTotalVisits">0</div>
        <div class="stat-label">Total Visits</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="statTotalBlocked">0</div>
        <div class="stat-label">Blocked</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="statTodayVisits">0</div>
        <div class="stat-label">Today's Visits</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="statTodayBlocked">0</div>
        <div class="stat-label">Today's Blocked</div>
      </div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <input type="search" id="searchInput" placeholder="Search URLs, titles…" style="flex:1; min-width:200px;">
      <select id="filterAction">
        <option value="all">All Actions</option>
        <option value="visit">Visits Only</option>
        <option value="blocked">Blocked Only</option>
      </select>
      <input type="date" id="filterDateFrom" title="From date">
      <input type="date" id="filterDateTo" title="To date">
      <button class="btn btn-outline btn-sm" id="btnExportCSV" title="Export as CSV">📥 CSV</button>
      <button class="btn btn-outline btn-sm" id="btnExportJSON" title="Export as JSON">📥 JSON</button>
      <button class="btn btn-danger btn-sm" id="btnClearLogs" title="Clear all logs">🗑️ Clear</button>
    </div>

    <!-- Logs table -->
    <div class="card" style="padding:0; overflow-x:auto;">
      <table id="logsTable">
        <thead>
          <tr>
            <th>Time</th>
            <th>Action</th>
            <th>URL</th>
            <th>Title</th>
            <th>Reason</th>
          </tr>
        </thead>
        <tbody id="logsBody">
        </tbody>
      </table>
    </div>

    <!-- Empty state -->
    <div class="empty-state" id="emptyState" style="display:none;">
      <div class="icon">📭</div>
      <p>No activity logs found. Browsing activity will appear here automatically.</p>
    </div>

    <!-- Pagination -->
    <div class="pagination" id="pagination"></div>
  </div>

  <script src="reports.js"></script>
</body>
</html>
