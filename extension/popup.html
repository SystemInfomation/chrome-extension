<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Watson Estates</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f1f0f7;
      color: #1e293b;
      font-size: 13px;
    }

    /* ── Header ── */
    .header {
      background: #fff;
      border-bottom: 1px solid #e2e8f0;
      padding: 16px 18px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .header-logo {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: #dbeafe;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .header-logo svg { width: 18px; height: 18px; }
    .header-text { flex: 1; }
    .welcome {
      font-size: 14px;
      font-weight: 600;
      color: #1e293b;
    }
    .subtitle {
      font-size: 11px;
      color: #64748b;
      margin-top: 2px;
    }
    .status-pill {
      display: flex;
      align-items: center;
      gap: 5px;
      background: #dcfce7;
      padding: 4px 10px;
      border-radius: 99px;
    }
    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #16a34a;
      animation: dot 2s ease-in-out infinite;
    }
    .status-label {
      font-size: 11px;
      font-weight: 600;
      color: #15803d;
    }
    @keyframes dot {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    /* ── Stats ── */
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 12px 14px 0;
    }
    .stat-card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 12px 14px;
    }
    .stat-card.wide { grid-column: 1 / -1; }
    .stat-value {
      font-size: 22px;
      font-weight: 600;
      color: #1e293b;
      line-height: 1;
    }
    .stat-label {
      font-size: 11px;
      color: #64748b;
      margin-top: 4px;
      line-height: 1.4;
    }

    /* ── Info rows ── */
    .info-section {
      padding: 10px 14px 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .info-row {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 9px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .info-icon {
      width: 24px;
      height: 24px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .info-icon svg { width: 13px; height: 13px; }
    .info-icon.green  { background: #dcfce7; }
    .info-icon.red    { background: #fee2e2; }
    .info-icon.blue   { background: #dbeafe; }
    .info-icon.amber  { background: #fef3c7; }
    .info-text { flex: 1; }
    .info-title {
      font-size: 12px;
      font-weight: 600;
      color: #1e293b;
    }
    .info-sub {
      font-size: 11px;
      color: #64748b;
      margin-top: 1px;
    }
    .info-version {
      font-size: 10px;
      color: #94a3b8;
    }

    /* ── Footer ── */
    .footer {
      border-top: 1px solid #e2e8f0;
      padding: 9px 18px;
      text-align: center;
    }
    .footer a {
      font-size: 11px;
      color: #64748b;
      text-decoration: none;
    }
    .footer a:hover { color: #1e293b; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="2.2"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
      </svg>
    </div>
    <div class="header-text">
      <div class="welcome">Watson Family</div>
      <div class="subtitle">Hello, William</div>
    </div>
    <div class="status-pill">
      <div class="status-dot"></div>
      <span class="status-label">Active</span>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats">
    <div class="stat-card">
      <div class="stat-value" id="blocked-today">—</div>
      <div class="stat-label">Sites blocked today</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="blocked-total">—</div>
      <div class="stat-label">Total sites blocked</div>
    </div>
    <div class="stat-card wide">
      <div class="stat-value" id="blocklist-size">—</div>
      <div class="stat-label">Domains in family-safe blocklist</div>
    </div>
  </div>

  <!-- Info rows -->
  <div class="info-section">
    <div class="info-row">
      <div class="info-icon green">
        <svg viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="2.5"
             stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>
      <div class="info-text">
        <div class="info-title">Games &amp; Streaming allowed</div>
        <div class="info-sub">Roblox, YouTube, Netflix &amp; more</div>
      </div>
    </div>

    <div class="info-row">
      <div class="info-icon blue">
        <svg viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="2.5"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
      </div>
      <div class="info-text">
        <div class="info-title">Malicious sites blocked</div>
        <div class="info-sub">Spyware &amp; malware blocked in real-time</div>
      </div>
    </div>

    <div class="info-row">
      <div class="info-icon amber">
        <svg viewBox="0 0 24 24" fill="none" stroke="#d97706" stroke-width="2.5"
             stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"/>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
        </svg>
      </div>
      <div class="info-text">
        <div class="info-title">Blocklist auto-updated</div>
        <div class="info-sub" id="blocklist-updated">Checking…</div>
      </div>
      <span class="info-version" id="version">v—</span>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <a href="https://watson-test-kitchen.vercel.app" target="_blank">Watson · Family-Safe Mode</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
