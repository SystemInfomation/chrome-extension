<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Watson Estates</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f1f5f9;
      color: #0f172a;
      font-size: 13px;
    }

    /* ── Header ── */
    .header {
      background: linear-gradient(135deg, #1e40af 0%, #2563eb 55%, #3b82f6 100%);
      padding: 14px 16px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header-icon {
      width: 36px; height: 36px;
      border-radius: 10px;
      background: rgba(255,255,255,0.18);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .header-icon svg { width: 18px; height: 18px; }
    .header-body { flex: 1; min-width: 0; }
    .header-title {
      font-size: 14px; font-weight: 700;
      color: #fff; letter-spacing: -0.2px;
    }
    .header-sub {
      font-size: 11px; color: rgba(255,255,255,0.72);
      margin-top: 1px;
    }
    .status-pill {
      display: flex; align-items: center; gap: 5px;
      background: rgba(255,255,255,0.16);
      border: 1px solid rgba(255,255,255,0.22);
      padding: 3px 8px; border-radius: 99px;
      flex-shrink: 0;
    }
    .status-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #4ade80;
      animation: blink 2s ease-in-out infinite;
    }
    .status-text { font-size: 10px; font-weight: 600; color: #fff; }
    @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0.5; } }

    /* ── Stats Grid ── */
    .stats {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 8px; padding: 10px 12px 10px;
    }
    .stat {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 10px 11px;
      transition: box-shadow 0.15s ease;
    }
    .stat:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
    .stat-chip {
      display: inline-flex; align-items: center; justify-content: center;
      width: 24px; height: 24px; border-radius: 7px;
      margin-bottom: 6px;
    }
    .stat-chip svg { width: 12px; height: 12px; }
    .chip-red   { background: #fef2f2; }
    .chip-blue  { background: #eff6ff; }
    .stat-num {
      font-size: 22px; font-weight: 700; color: #0f172a;
      line-height: 1; letter-spacing: -0.5px;
    }
    .stat-lbl {
      font-size: 10px; color: #64748b;
      margin-top: 3px; line-height: 1.4;
    }

    /* ── Footer ── */
    .footer {
      border-top: 1px solid #e2e8f0;
      padding: 7px 12px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .footer-updated {
      font-size: 10px; color: #94a3b8;
    }
    .footer-version {
      font-size: 10px; font-weight: 600;
      padding: 2px 7px; border-radius: 99px;
      background: #dbeafe; color: #1d4ed8;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
      </svg>
    </div>
    <div class="header-body">
      <div class="header-title">Watson Family</div>
      <div class="header-sub">Hello, William 👋</div>
    </div>
    <div class="status-pill">
      <div class="status-dot"></div>
      <span class="status-text">Protected</span>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats" id="stats">
    <div class="stat">
      <div class="stat-chip chip-red">
        <svg viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2.2"
             stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/>
        </svg>
      </div>
      <div class="stat-num" id="blocked-today">—</div>
      <div class="stat-lbl">Blocked today</div>
    </div>
    <div class="stat">
      <div class="stat-chip chip-blue">
        <svg viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2.2"
             stroke-linecap="round" stroke-linejoin="round">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
        </svg>
      </div>
      <div class="stat-num" id="blocked-total">—</div>
      <div class="stat-lbl">Total blocked</div>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <span class="footer-updated" id="blocklist-updated">Checking…</span>
    <span class="footer-version" id="version">v—</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
