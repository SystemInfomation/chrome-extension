<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Watson Control Tower</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{width:260px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f8fafc;color:#0f172a;font-size:12px}

    .hdr{background:linear-gradient(135deg,#1e40af,#3b82f6);padding:10px 12px;display:flex;align-items:center;gap:8px}
    .hdr-body{flex:1;min-width:0}
    .hdr-title{font-size:13px;font-weight:700;color:#fff}
    .hdr-sub{font-size:10px;color:rgba(255,255,255,.7);margin-top:1px}
    .pill{display:flex;align-items:center;gap:4px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2);padding:2px 7px;border-radius:99px;flex-shrink:0}
    .dot{width:5px;height:5px;border-radius:50%;background:#4ade80;animation:blink 2s ease-in-out infinite}
    .pill-txt{font-size:9px;font-weight:600;color:#fff}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.45}}

    .stats{display:flex;gap:6px;padding:8px 10px}
    .stat{flex:1;background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:8px 9px;text-align:center}
    .stat-num{font-size:20px;font-weight:700;line-height:1;letter-spacing:-.4px}
    .stat-lbl{font-size:9px;color:#64748b;margin-top:2px}

    .row{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;border-top:1px solid #e2e8f0}
    .row-lbl{font-size:10px;color:#64748b;font-weight:500}
    .row-val{font-size:10px;font-weight:600;display:flex;align-items:center;gap:4px}
    .row-dot{width:5px;height:5px;border-radius:50%}
    .g{color:#16a34a}.r{color:#ef4444}.m{color:#94a3b8}

    .toggle{position:relative;width:32px;height:18px;background:#cbd5e1;border-radius:99px;cursor:pointer;transition:background .2s;border:none;padding:0;flex-shrink:0}
    .toggle::after{content:"";position:absolute;top:2px;left:2px;width:14px;height:14px;background:#fff;border-radius:50%;transition:transform .2s}
    .toggle.active{background:#ef4444}
    .toggle.active::after{transform:translateX(14px)}

    .tabs-hdr{cursor:pointer;user-select:none}
    .tabs-cnt{font-size:9px;font-weight:600;color:#3b82f6;padding:1px 5px;background:#eff6ff;border-radius:99px}
    .tabs-list{max-height:100px;overflow-y:auto;margin-top:3px}
    .tabs-list::-webkit-scrollbar{width:2px}
    .tabs-list::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:2px}
    .tab{display:flex;align-items:center;gap:4px;padding:2px 0;font-size:9px;color:#334155;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .tab img{width:10px;height:10px;flex-shrink:0;border-radius:2px}
    .tab span{overflow:hidden;text-overflow:ellipsis}

    .ftr{border-top:1px solid #e2e8f0;padding:5px 10px;display:flex;align-items:center;justify-content:space-between}
    .ftr-upd{font-size:9px;color:#94a3b8}
    .ftr-ver{font-size:9px;font-weight:600;padding:1px 6px;border-radius:99px;background:#dbeafe;color:#1d4ed8}
  </style>
</head>
<body>

  <div class="hdr">
    <div class="hdr-body">
      <div class="hdr-title">Watson Family</div>
      <div class="hdr-sub" id="greeting">Hello 👋</div>
    </div>
    <div class="pill">
      <div class="dot"></div>
      <span class="pill-txt">Protected</span>
    </div>
  </div>

  <div class="stats" id="stats">
    <div class="stat">
      <div class="stat-num" id="blocked-today">—</div>
      <div class="stat-lbl">Blocked today</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="blocked-total">—</div>
      <div class="stat-lbl">Total blocked</div>
    </div>
  </div>

  <div class="row">
    <span class="row-lbl">Monitoring</span>
    <span class="row-val m" id="monitor-status">
      <span class="row-dot" id="monitor-dot" style="background:#94a3b8"></span>
      <span id="monitor-text">Checking…</span>
    </span>
  </div>

  <div class="row">
    <span class="row-lbl">Block All Internet</span>
    <button class="toggle" id="block-toggle" title="Toggle internet block"></button>
  </div>

  <div class="row tabs-hdr" id="tabs-toggle">
    <span class="row-lbl">Open Tabs</span>
    <span class="tabs-cnt" id="tabs-count">—</span>
  </div>
  <div class="tabs-list" id="tabs-list" style="display:none;padding:0 10px 4px"></div>

  <div class="ftr">
    <span class="ftr-upd" id="blocklist-updated">Checking…</span>
    <span class="ftr-ver" id="version">v—</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
